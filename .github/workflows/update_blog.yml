name: AI Multi-Category Blog Auto-Updater

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Intelligent Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          python - <<EOF
          import os
          import requests
          import json

          # 1. جلب خبر من NewsAPI
          news_url = f"https://newsapi.org/v2/everything?q=finance+OR+investing+OR+AI+tools&language=en&pageSize=1&apiKey={os.getenv('NEWS_API_KEY')}"
          news_res = requests.get(news_url).json()
          article = news_res['articles'][0]
          source_text = f"Title: {article['title']}. Description: {article['description']}"

          # 2. مخاطبة Gemini مباشرة (Direct API Call)
          gemini_url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key={os.getenv('GEMINI_API_KEY')}"
          headers = {'Content-Type': 'application/json'}
          prompt = f"Analyze this news: {source_text}. 1. Choose category from: [FINANCE, AI, INVESTING, HUSTLES, TIPS]. 2. Write a professional blog post in HTML. Return ONLY in this format: CATEGORY: [Name] CONTENT: [HTML Content]"
          
          data = {"contents": [{"parts": [{"text": prompt}]}]}
          response = requests.post(gemini_url, headers=headers, json=data).json()
          
          # استخراج النص
          full_text = response['candidates'][0]['content']['parts'][0]['text']
          category = full_text.split('CONTENT:')[0].replace('CATEGORY:', '').strip()
          new_html = full_text.split('CONTENT:')[1].strip()

          # 3. تحديث الملف
          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          tag = f""
          if tag in content:
              updated_content = content.replace(tag, f"{tag}\n<article class='p-6 bg-gray-800 rounded-lg shadow-xl mb-6'>\n{new_html}\n</article>")
              with open('index.html', 'w', encoding='utf-8') as f:
                  f.write(updated_content)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "WealthRiseNow Bot"
          git config --global user.email "bot@wealthrisenow.com"
          git add index.html
          git commit -m "Confirmed: AI Daily Article Added"
          git push
