name: AI Multi-Category Blog Auto-Updater

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Intelligent Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          python - <<EOF
          import os
          import requests
          import json

          news_key = os.getenv('NEWS_API_KEY')
          gemini_key = os.getenv('GEMINI_API_KEY')

          if not gemini_key:
              print("Error: GEMINI_API_KEY is missing!")
              exit(1)

          print("1. Fetching news from NewsAPI...")
          news_url = f"https://newsapi.org/v2/everything?q=finance+OR+investing+OR+AI+tools&language=en&pageSize=1&apiKey={news_key}"
          news_res = requests.get(news_url).json()
          
          if 'articles' not in news_res or len(news_res['articles']) == 0:
              print("Error fetching news:", news_res)
              exit(1)

          article = news_res['articles'][0]
          source_text = f"Title: {article['title']}. Description: {article['description']}"
          print(f"News fetched successfully: {article['title']}")

          print("2. Sending data to Gemini...")
          # هنا التغيير الوحيد: استخدمنا الموديل الأحدث 2.5
          gemini_url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={gemini_key}"
          headers = {'Content-Type': 'application/json'}
          prompt = f"Analyze this news: {source_text}. 1. Choose ONE category from exactly these options: [FINANCE, AI, INVESTING, HUSTLES, TIPS]. 2. Write a short, professional blog post in HTML format. Return ONLY your answer in this exact format:\nCATEGORY: [Name]\nCONTENT: [HTML Content]"
          
          data = {"contents": [{"parts": [{"text": prompt}]}]}
          response = requests.post(gemini_url, headers=headers, json=data).json()
          
          if 'candidates' not in response:
              print("GEMINI API ERROR! Here is the exact reason:")
              print(json.dumps(response, indent=2))
              exit(1)
          
          print("3. Processing Gemini response...")
          full_text = response['candidates'][0]['content']['parts'][0]['text']
          
          try:
              category = full_text.split('CONTENT:')[0].replace('CATEGORY:', '').strip()
              new_html = full_text.split('CONTENT:')[1].strip()
          except Exception as e:
              print("Error formatting text. Gemini returned:")
              print(full_text)
              exit(1)

          print(f"Category identified: {category}")

          print("4. Updating index.html...")
          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          tag = f""
          if tag in content:
              updated_content = content.replace(tag, f"{tag}\n<article style='padding: 20px; background: #2a2a2a; border-radius: 10px; margin-bottom: 20px; color: white;'>\n{new_html}\n</article>")
              with open('index.html', 'w', encoding='utf-8') as f:
                  f.write(updated_content)
              print("Success! File updated.")
          else:
              print(f"Error: Tag {tag} not found in index.html")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "WealthRiseNow Bot"
          git config --global user.email "bot@wealthrisenow.com"
          git add index.html
          git commit -m "AI Article Added Successfully" || echo "No changes to commit"
          git push
